# Backend docker-compose
# TODO: For dev, only the `api` service is required (SQLite is file-based).
#       To switch to PostgreSQL, uncomment the `db` service and update DATABASE_URL.

services:
  api:
    build: .
    container_name: gym_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
